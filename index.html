<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nothing.</title>

  <!-- ═══════════════════════════════════════════════════════════
       SETUP INSTRUCTIONS (read before deploying)
       ═══════════════════════════════════════════════════════════

    1. Go to https://firebase.google.com and click "Get started"
    2. Create a new project (any name, e.g. "nothing-button")
    3. In your project console → Build → Realtime Database → Create database
       Choose "Start in test mode" (allows public reads + writes — perfect for this)
    4. Copy your config: Project Settings (⚙️) → Your apps → Add app (</>) → Register
       Paste the firebaseConfig values below, replacing the placeholder strings.
    5. Push this file to GitHub and enable GitHub Pages in repo Settings → Pages.
       That's it. Your shared counter is live.

    ⚠️  Test mode rules expire after 30 days. To keep it public forever, set
        Realtime Database rules to:
        { "rules": { ".read": true, ".write": true } }
  ═══════════════════════════════════════════════════════════════ -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --red:       #e02020;
      --red-dark:  #b01818;
      --red-glow:  rgba(224, 32, 32, 0.3);
      --bg:        #f7f7f5;
      --text:      #111;
      --muted:     #999;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── title ── */
    h1 {
      font-size: clamp(0.85rem, 2vw, 1.1rem);
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: lowercase;
      color: var(--muted);
      margin-bottom: clamp(3rem, 8vh, 5rem);
    }

    /* ── button wrapper (handles ripple overflow) ── */
    .btn-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── the button ── */
    #the-button {
      width: clamp(180px, 38vmin, 300px);
      height: clamp(180px, 38vmin, 300px);
      border-radius: 50%;
      border: none;
      background: var(--red);
      cursor: pointer;
      position: relative;
      transition: transform 80ms ease, box-shadow 80ms ease;
      box-shadow:
        0 0 0 0 var(--red-glow),
        0 12px 40px rgba(0,0,0,0.15),
        0 4px 12px rgba(0,0,0,0.10);
      outline: none;
    }

    #the-button::after {
      content: '';
      position: absolute;
      inset: 12%;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, rgba(255,255,255,0.22) 0%, transparent 65%);
      pointer-events: none;
    }

    #the-button:hover {
      box-shadow:
        0 0 0 18px var(--red-glow),
        0 16px 48px rgba(0,0,0,0.18),
        0 6px 16px rgba(0,0,0,0.12);
    }

    #the-button:active,
    #the-button.pressed {
      transform: scale(0.93);
      box-shadow:
        0 0 0 8px var(--red-glow),
        0 6px 20px rgba(0,0,0,0.14),
        0 2px 8px rgba(0,0,0,0.10);
    }

    /* ── ripple ── */
    .ripple {
      position: absolute;
      border-radius: 50%;
      border: 2px solid var(--red);
      opacity: 0.6;
      width: clamp(180px, 38vmin, 300px);
      height: clamp(180px, 38vmin, 300px);
      animation: ripple-out 0.7s ease-out forwards;
      pointer-events: none;
    }

    @keyframes ripple-out {
      0%   { transform: scale(1);   opacity: 0.55; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    /* ── counter ── */
    .counter-wrap {
      margin-top: clamp(2.5rem, 7vh, 4rem);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    #counter {
      font-family: 'DM Mono', monospace;
      font-size: clamp(2.8rem, 9vw, 5.5rem);
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1;
      transition: transform 120ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #counter.bump {
      transform: scale(1.12);
    }

    .counter-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── loading state ── */
    #counter.loading {
      opacity: 0.25;
    }

    /* ── footer ── */
    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      color: #ccc;
    }
  </style>
</head>
<body>

  <h1>nothing.</h1>

  <div class="btn-wrap" id="btn-wrap">
    <button id="the-button" aria-label="Click the button"></button>
  </div>

  <div class="counter-wrap">
    <span id="counter" class="loading">—</span>
    <span class="counter-label">times pressed</span>
  </div>

  <footer>click it.</footer>

  <!-- Firebase SDK (module) -->
  <script type="module">
    import { initializeApp }            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref,
             runTransaction, onValue }  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    /* ── ✏️  PASTE YOUR FIREBASE CONFIG HERE ── */
    const firebaseConfig = {
      apiKey:            "YOUR_API_KEY",
      authDomain:        "YOUR_PROJECT.firebaseapp.com",
      databaseURL:       "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
      projectId:         "YOUR_PROJECT",
      storageBucket:     "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId:             "YOUR_APP_ID"
    };
    /* ──────────────────────────────────────── */

    const app      = initializeApp(firebaseConfig);
    const db       = getDatabase(app);
    const countRef = ref(db, 'clickCount');

    const btn      = document.getElementById('the-button');
    const btnWrap  = document.getElementById('btn-wrap');
    const counter  = document.getElementById('counter');

    /* ── real-time listener: updates counter for everyone live ── */
    onValue(countRef, (snapshot) => {
      const val = snapshot.val() ?? 0;
      counter.textContent = val.toLocaleString();
      counter.classList.remove('loading');
    });

    /* ── Web Audio click sound ── */
    function playClick() {
      try {
        const ctx      = new (window.AudioContext || window.webkitAudioContext)();
        const duration = 0.08;
        const buf      = ctx.createBuffer(1, Math.floor(ctx.sampleRate * duration), ctx.sampleRate);
        const data     = buf.getChannelData(0);

        for (let i = 0; i < data.length; i++) {
          const t     = i / data.length;
          const env   = Math.pow(1 - t, 6);           // sharp decay
          const noise = (Math.random() * 2 - 1) * env;
          const tone  = Math.sin(2 * Math.PI * 200 * t) * env * 0.4; // low thud
          data[i]     = noise * 0.6 + tone;
        }

        const src  = ctx.createBufferSource();
        src.buffer = buf;

        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.55, ctx.currentTime);

        src.connect(gain);
        gain.connect(ctx.destination);
        src.start();
        src.onended = () => ctx.close();
      } catch (e) {
        // audio blocked — no problem
      }
    }

    /* ── ripple effect ── */
    function spawnRipple() {
      const r = document.createElement('span');
      r.className = 'ripple';
      btnWrap.appendChild(r);
      r.addEventListener('animationend', () => r.remove());
    }

    /* ── counter bounce ── */
    function bumpCounter() {
      counter.classList.remove('bump');
      void counter.offsetWidth; // reflow trick to restart animation
      counter.classList.add('bump');
      counter.addEventListener('transitionend', () => counter.classList.remove('bump'), { once: true });
    }

    /* ── click handler ── */
    let clicking = false;

    btn.addEventListener('click', () => {
      if (clicking) return;
      clicking = true;
      setTimeout(() => clicking = false, 150);

      playClick();
      spawnRipple();
      bumpCounter();

      btn.classList.add('pressed');
      setTimeout(() => btn.classList.remove('pressed'), 120);

      // Atomically increment the counter in Firebase
      runTransaction(countRef, (current) => (current ?? 0) + 1);
    });
  </script>
</body>
</html>
